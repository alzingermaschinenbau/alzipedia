<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>Alzipedia · Service-Wissen Lepton 5100</title>
<meta name="theme-color" content="#c00000">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Alzipedia">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#c00000; --red2:#9d0000;
  --paper:#f4f5f7; --card:#ffffff; --ink:#191b1f; --muted:#6b7280;
  --line:#e5e7eb; --soft:#f0f1f4;
}
*{box-sizing:border-box}
html{background:var(--paper);overscroll-behavior-y:none}
body{margin:0;font-family:Manrope,system-ui,Arial,sans-serif;color:var(--ink);background:var(--paper);
  overscroll-behavior-y:none;overflow-x:clip;-webkit-text-size-adjust:100%}
.mono{font-family:"IBM Plex Mono",monospace}
button{font-family:inherit}
input,textarea,select{font-family:inherit}
img{max-width:100%}
.hidden{display:none!important}

/* Kopf */
header.top{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;
  padding:20px 16px 18px;padding-top:calc(22px + env(safe-area-inset-top));box-shadow:0 2px 10px rgba(0,0,0,.18)}
.tbar{position:relative}
.tbar .logo{height:30px;width:auto;display:block}
.tdiv{height:1px;background:rgba(255,255,255,.28);margin:18px 0 13px}
.tsub{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;opacity:.95}
.tsub svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
.tacts{position:absolute;top:-3px;right:0;display:flex;gap:8px}
.icobtn{background:rgba(255,255,255,.16);border:0;color:#fff;width:38px;height:38px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.icobtn svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icobtn:active{transform:scale(.94)}
.alzibtn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 14px 0 6px;border:0;border-radius:999px;
  background:#fff;color:var(--red);font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.22);
  animation:alziglow 2.6s ease-in-out infinite}
.alzibtn .alziav{position:relative;width:27px;height:27px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;font-weight:900;font-size:15px;flex:0 0 auto}
.alzibtn .alzidot{position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:50%;background:#22c55e;border:2px solid #fff}
.alzibtn .alzitx{white-space:nowrap;line-height:1}
.alzibtn .alzitx b{font-weight:800;opacity:.75}
.alzibtn:active{transform:scale(.96)}
@keyframes alziglow{0%,100%{box-shadow:0 3px 12px rgba(0,0,0,.22)}50%{box-shadow:0 3px 18px rgba(255,255,255,.55)}}
@media(max-width:380px){.alzibtn .alzitx b{display:none}}

.wrap{max-width:880px;margin:0 auto;padding:14px;padding-bottom:90px}

/* Cockpit / Startseite */
.greet{margin:4px 2px 14px}
.greet h2{font-size:24px;font-weight:800;letter-spacing:-.3px}
.greet p{color:var(--muted);font-size:14px;margin-top:3px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat{border:1px solid var(--line);border-radius:14px;padding:13px 12px;cursor:pointer;transition:transform .05s,box-shadow .15s}
.stat:active{transform:scale(.97)}
.stat.active{box-shadow:0 0 0 2px currentColor inset}
.stat .num{font-size:26px;font-weight:800;line-height:1}
.stat .lab{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-top:6px;line-height:1.2}
.reminders{border:1px solid var(--line);border-radius:14px;background:#fff;padding:11px 13px;margin-bottom:16px}
.reminders .rmh{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:4px}
.rmrow{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid var(--line);cursor:pointer;font-size:14px}
.rmrow:first-of-type{border-top:0}
.rmrow .rmw{font-weight:600}
.rmrow .rmd{color:var(--muted);font-size:12px;white-space:nowrap}
.rmrow.soon .rmd{color:#b45309;font-weight:700}
.rmrow.over .rmd{color:#c00000;font-weight:800}
@media print{
  header.top,.fab,.searchbar,.tabs,#home,.toast,.lb,#backBtn,.detail .row{display:none!important}
  .wrap{padding:0;max-width:none}
  .detail{box-shadow:none;border:0}
  body{background:#fff}
  .shots img{height:auto;max-height:220px}
}

/* Suche + Tabs */
.searchbar{display:flex;gap:8px;margin:4px 0 12px}
.searchbar input{flex:1;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:16px;background:#fff;outline:none}
.searchbar input:focus{border-color:var(--red)}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:14px;
  font-weight:600;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.tab .cnt{font-size:12px;background:var(--soft);border-radius:999px;padding:1px 7px;color:var(--muted)}
.tab.active{background:var(--red);border-color:var(--red);color:#fff}
.tab.active .cnt{background:rgba(255,255,255,.25);color:#fff}
.tab .dot{width:9px;height:9px;border-radius:50%}

/* Liste */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:10px;
  cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:box-shadow .15s,transform .05s}
.card:active{transform:scale(.995)}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08)}
.card .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;color:#fff}
.card h3{margin:8px 0 4px;font-size:16px;font-weight:700;line-height:1.25;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .snip{font-size:13px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:11px;color:#9aa0a8;margin-top:8px;display:flex;gap:10px;flex-wrap:wrap}
.listhd{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:4px 2px 10px}
.showall{width:100%;border:1px solid var(--line);background:#fff;color:var(--red);border-radius:12px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;margin:2px 0 8px}
.showall:active{transform:scale(.99)}
.taglist{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:11px;background:var(--soft);color:#4b5563;border-radius:6px;padding:2px 8px;font-weight:600}

.empty{text-align:center;color:var(--muted);padding:50px 20px}
.empty svg{width:46px;height:46px;stroke:#c4c8ce;fill:none;stroke-width:1.6;margin-bottom:10px}

/* Detail */
.detail{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.detail h2{margin:10px 0 6px;font-size:22px;font-weight:800;line-height:1.2;overflow-wrap:anywhere}
.detail .meta{font-size:12px;color:var(--muted);margin-bottom:14px}
.detail .body{font-size:15px;line-height:1.6;color:#2b2f36;overflow-wrap:anywhere}
.detail .body h4{margin:18px 0 6px;font-size:15px}
.detail .body ul{margin:6px 0;padding-left:22px}
.detail .body li{margin:3px 0}
.sec{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin:10px 0;background:#fff}
.sec.sym{border-left:4px solid #2563eb}
.sec.urs{border-left:4px solid #d97706}
.sec.los{border-left:4px solid #16a34a}
.sec .lab{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.shots{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin:14px 0}
.shots img{width:100%;height:96px;object-fit:cover;border-radius:10px;border:1px solid var(--line);cursor:zoom-in}
.docs{display:flex;flex-direction:column;gap:8px;margin:14px 0}
.docrow{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;text-decoration:none;color:var(--ink);background:#fff}
.docrow .docic{width:32px;height:32px;flex:0 0 32px;border-radius:8px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--red)}
.docrow .docic svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.docrow .docnm{flex:1;font-weight:600;font-size:14px;word-break:break-word}
.docrow .docsz{color:var(--muted);font-size:12px;white-space:nowrap}
.filelist{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.fileitem{display:flex;align-items:center;gap:9px;padding:10px 11px;border:1px solid var(--line);border-radius:10px;background:#fafbfc}
.fileitem .fnm{flex:1;font-size:14px;font-weight:600;word-break:break-word;color:var(--ink);text-decoration:none}
.fileitem .fsz{color:var(--muted);font-size:12px;white-space:nowrap}
.fileitem .x{cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:0 4px}

/* Editor */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:16px;background:#fff;outline:none}
.field:focus{border-color:var(--red)}
textarea.field{min-height:120px;resize:vertical;line-height:1.5}
.fg2{display:flex;gap:10px}
.fg2 .fg{flex:1}
.mtable{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:4px}
.mrow{display:flex;justify-content:space-between;gap:12px;padding:9px 12px;border-bottom:1px solid var(--line);background:#fff}
.mrow:last-child{border-bottom:0}
.mrow .mk{color:var(--muted);font-size:13px;font-weight:600}
.mrow .mv{font-weight:700;text-align:right;word-break:break-word}
.kvrow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.kvrow .field{flex:1;font-size:15px}
.reprow{position:relative;border:1px solid var(--line);border-radius:10px;padding:10px;padding-right:30px;margin-bottom:10px;background:#fafbfc}
.reprow .rdat{margin-bottom:8px}
.reprow .rtxt{min-height:64px}
.xrm{cursor:pointer;color:#c00000;font-size:22px;line-height:1;flex:0 0 auto;width:24px;text-align:center}
.reprow .xrm{position:absolute;top:8px;right:6px}
.reprow-d{border-left:3px solid #16a34a;padding:4px 0 4px 12px;margin:10px 0}
.reprow-d .repd{font-size:12px;font-weight:700;color:var(--muted)}
.reprow-d .rept{margin-top:2px}
.muted2{color:var(--muted);font-size:13px}
.linkbox{max-height:240px;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:4px}
.lkrow{display:flex;align-items:center;gap:9px;padding:9px 8px;border-radius:8px;cursor:pointer}
.lkrow:hover{background:#f6f7f9}
.lkrow input{width:18px;height:18px;flex:0 0 auto}
.lkrow .lktt{font-size:14px;font-weight:600}
.lkrow .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.lnkrow{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line);cursor:pointer}
.lnkrow:first-of-type{border-top:0}
.lnkrow .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.lnkrow .lktt{flex:1;font-weight:600;font-size:14px}
.lnkrow .lkty{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.qrbox{margin-top:10px;text-align:center}
.qrimg{width:240px;max-width:100%;height:auto;border:1px solid var(--line);border-radius:10px;padding:8px;background:#fff}
.qrurl{font-size:11px;color:var(--muted);word-break:break-all;margin:6px 0 4px}
.dblsec{border:1px solid var(--line);border-radius:12px;margin:10px 0;background:#fff;overflow:hidden}
.dblsec>summary{cursor:pointer;font-weight:700;padding:12px 14px;list-style:none;display:flex;align-items:center;gap:8px}
.dblsec>summary::-webkit-details-marker{display:none}
.dblsec>summary:before{content:"▸";color:var(--muted)}
.dblsec[open]>summary:before{content:"▾"}
.dblsec .dbc{font-size:11px;color:var(--muted);font-weight:600}
.standbanner{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,rgba(22,163,74,.10),rgba(22,163,74,.03));border:1px solid rgba(22,163,74,.45);border-radius:13px;padding:13px 15px;margin:4px 0 14px}
.standbanner svg{width:28px;height:28px;fill:none;stroke:#16a34a;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
.standbanner .sbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#15803d;font-weight:800}
.standbanner .sbd{font-size:19px;font-weight:800;line-height:1.1}
.grouphd{font-size:16px;font-weight:800;margin:22px 0 10px;padding-bottom:7px;border-bottom:2px solid var(--line);display:flex;align-items:center;gap:9px}
.grouphd .ghi{font-size:17px}
.reprow-d.deliv{border-left-color:#c00000}
.reprow-d.deliv .repd{color:#c00000}
.dllist{border-top:1px solid var(--line)}
.dlh{font-weight:800;font-size:13px;padding:11px 14px 5px;background:#fafbfc;border-bottom:1px solid var(--line)}
.dlr{display:flex;gap:12px;padding:8px 14px;border-bottom:1px solid var(--line)}
.dlr:last-child{border-bottom:0}
.dlr .dlk{flex:0 0 38%;color:var(--muted);font-size:13px;font-weight:600;word-break:break-word}
.dlr .dlv{flex:1;font-size:13px;font-weight:600;word-break:break-word}
.subbar{display:flex;gap:8px;overflow-x:auto;margin:0 0 12px;padding-bottom:2px}
.subchip{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
.subchip.active{background:#ea580c;border-color:#ea580c;color:#fff}
.subchip .sc{opacity:.7;font-size:11px}
.langrow{display:flex;gap:8px;flex-wrap:wrap}
.langbtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer}
.langbtn.active{background:var(--red);border-color:var(--red);color:#fff}
.chatpane{display:flex;flex-direction:column;min-height:0}
body.chatopen{overflow:hidden}
body.chatopen .wrap{padding-bottom:0}
.chathd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.chacts{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.chatdel{border:1px solid var(--line);background:#fff;border-radius:10px;width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:#c00000;flex:0 0 auto}
.chatdel svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chatdel:active{transform:scale(.94)}
.kitog{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:800;color:var(--muted);cursor:pointer;white-space:nowrap}
.kitog.on{background:#16a34a;border-color:#16a34a;color:#fff}
.ivbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--red);background:#fff;color:var(--red);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap}
.ivbtn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ivbtn.on{background:var(--red);color:#fff}
.ivbtn:active{transform:scale(.96)}
@media(max-width:480px){.ivbtn span{display:none}.ivbtn{padding:9px}}
.cbub.bot.err{background:#fdecec;color:#a11}
.typing{display:inline-flex;gap:4px;align-items:center;padding:2px 0}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--muted);opacity:.4;animation:tdot 1s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:.9;transform:translateY(-3px)}}
.chatmsgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;display:flex;flex-direction:column;gap:10px;padding:4px 0 12px;min-height:0}
.cintro{color:var(--muted);font-size:14px;text-align:center;padding:24px 10px}
.cwrap{display:flex;flex-direction:column;align-items:flex-start;gap:6px;max-width:92%;align-self:flex-start}
.bname{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--ink);margin:2px 0 1px}
.bav{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:0 0 auto}
.bts{font-weight:600;color:var(--muted)}
.cbub.rich{white-space:normal}
.cbub.rich div{margin:2px 0}.cbub.rich h4{margin:8px 0 3px;font-size:14px}
.cbub.rich ul{margin:4px 0 4px 18px;padding:0}.cbub.rich li{margin:2px 0}
.cbub.rich strong{font-weight:800}
.kidisc{margin-top:8px;font-size:11px;color:var(--muted)}
.chiprow{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--red);background:#fff;color:var(--red);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.chip:active{transform:scale(.97)}
.teachbtn{align-self:flex-start;margin-top:6px;display:inline-flex;align-items:center;gap:6px;border:1px dashed var(--muted);background:#fff;color:var(--muted);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
.teachbtn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.teachbtn:active{transform:scale(.97)}
.teachcard{align-self:stretch;background:#fff;border:1px solid var(--red);border-radius:14px;padding:13px;margin-top:6px}
.teachcard .tlb{display:block;font-size:12px;font-weight:800;color:var(--muted);margin:8px 0 4px}
.teachcard textarea{min-height:64px}
.trthumbs{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.trth{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.trth img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
.trth .trrm{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:13px;line-height:18px;text-align:center;cursor:pointer;font-style:normal}
.cimgs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.cimgs img{max-width:160px;max-height:160px;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;display:block}
.cbub{max-width:92%;border-radius:14px;padding:11px 13px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.cbub.user{align-self:flex-end;background:var(--red);color:#fff;border-bottom-right-radius:4px}
.cbub.bot{align-self:flex-start;background:#f1f3f6;color:var(--ink);border-bottom-left-radius:4px}
.cbub.bot .bhd{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:8px}
.cres{background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-top:8px;cursor:pointer}
.cres:first-of-type{margin-top:0}
.cres .crt{font-weight:800;margin:6px 0 3px}
.cres .cra{font-size:13px;color:var(--ink)}
.cres .cro{font-size:12px;font-weight:700;color:var(--red);margin-top:6px}
.chatbar{display:flex;gap:8px;align-items:flex-end;border-top:1px solid var(--line);padding-top:10px;position:sticky;bottom:0;background:var(--card)}
.chatbar .field{flex:1;margin:0}
.chatbar textarea.field{resize:none;line-height:1.4;max-height:160px;overflow-y:auto;min-height:44px}
.chatbar .btn{padding:11px 14px}
.chatbar .btn svg{margin:0}
.micbtn{flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--red);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.micbtn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.micbtn:active{transform:scale(.94)}
.pendimg{display:none;flex-wrap:wrap;gap:8px;padding:8px 0 2px}
.pend{position:relative;width:54px;height:54px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.pend img{width:100%;height:100%;object-fit:cover;display:block}
.pend .prm{position:absolute;top:1px;right:1px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:12px;line-height:18px;text-align:center;cursor:pointer;font-style:normal}
.cbub.user .uatt{font-size:12px;opacity:.85;margin-bottom:4px}
.micbtn.on{background:var(--red);color:#fff;animation:micpulse 1.2s infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(192,0,0,.5)}50%{box-shadow:0 0 0 8px rgba(192,0,0,0)}}
.typegrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.typepick{border:1px solid var(--line);border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:9px;background:#fff;color:var(--ink)}
.typepick .dot{width:11px;height:11px;border-radius:50%}
.typepick.active{border-color:var(--red);box-shadow:inset 0 0 0 1px var(--red);background:#fff5f5}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.thumb{position:relative;width:78px;height:78px}
.thumb img{width:100%;height:100%;object-fit:cover;border-radius:9px;border:1px solid var(--line)}
.thumb .x{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:#111;color:#fff;border:2px solid #fff;
  font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* Buttons */
.btn{border:0;border-radius:11px;padding:12px 16px;font-size:15px;font-weight:700;cursor:pointer;display:inline-flex;
  align-items:center;justify-content:center;gap:8px}
.btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn.primary{background:var(--red);color:#fff}
.btn.ghost{background:var(--soft);color:var(--ink)}
.btn.danger{background:#fff;color:var(--red);border:1px solid var(--red)}
.btn.block{width:100%}
.btn:active{transform:scale(.98)}
.row{display:flex;gap:10px}
.row>.btn{flex:1}

/* Schwebender Neu-Knopf */
.fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:25;background:var(--red);color:#fff;
  border:0;border-radius:16px;height:54px;padding:0 20px;font-size:16px;font-weight:800;box-shadow:0 6px 18px rgba(192,0,0,.4);
  display:flex;align-items:center;gap:9px;cursor:pointer}
.fab svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2.4;stroke-linecap:round}
.fab:active{transform:scale(.96)}

/* Login */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(135deg,var(--red),var(--red2))}
.gatebox{background:#fff;border-radius:18px;padding:26px 24px;width:100%;max-width:360px;box-shadow:0 14px 40px rgba(0,0,0,.3);text-align:center}
.gatebox img{height:46px;margin-bottom:6px}
.gatebox .nm{font-weight:800;font-size:22px;margin:2px 0}
.gatebox .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.gatebox .field{margin-bottom:10px;text-align:left}
.gateerr{color:var(--red);font-size:13px;font-weight:600;min-height:18px;margin:4px 0}

/* Statuszeile / Verbindung */
.conn{font-size:12px;display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
.conn .led{width:9px;height:9px;border-radius:50%;background:#9aa0a8}
.conn.ok .led{background:#16a34a}
.conn.off .led{background:#d97706}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + env(safe-area-inset-bottom));z-index:60;
  background:#111;color:#fff;padding:10px 16px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.3);
  opacity:0;pointer-events:none;transition:opacity .2s;max-width:90vw;text-align:center}
.toast.show{opacity:1}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
.lb.show{display:flex}
.lb img{max-width:100%;max-height:100%;border-radius:8px}
.lb .x{position:absolute;top:14px;right:16px;color:#fff;font-size:34px;cursor:pointer;line-height:1}
.verbtn{background:none;border:0;color:#aab;font-size:11px;cursor:pointer;text-decoration:underline;padding:4px}
.clog{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:85;display:none;align-items:center;justify-content:center;padding:18px}
.clog.show{display:flex}
.clogbox{background:var(--card);border-radius:16px;max-width:520px;width:100%;max-height:80vh;overflow:auto;box-shadow:0 14px 50px rgba(0,0,0,.35)}
.cloghd{position:sticky;top:0;background:var(--card);display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
.cloghd b{font-size:16px}
.cloghd .x{font-size:26px;cursor:pointer;line-height:1;color:var(--muted)}
.clogrow{display:flex;gap:12px;padding:11px 18px;border-bottom:1px solid var(--line);font-size:14px;line-height:1.45}
.clogrow:last-child{border-bottom:0}
.clogv{flex:0 0 64px;font-weight:800;color:var(--red);font-variant-numeric:tabular-nums}
.clogd{color:var(--ink)}

.note{background:#fff8e1;border:1px solid #f3e3a3;border-radius:11px;padding:12px 14px;font-size:13px;line-height:1.5;color:#6b5a16;margin:10px 0}
.code{background:#0f172a;color:#cbd5e1;border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.5;overflow-x:auto;white-space:pre;font-family:"IBM Plex Mono",monospace;margin:8px 0}
.setrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
.setrow .l{font-size:14px}
a{color:var(--red)}
hr.s{border:0;border-top:1px solid var(--line);margin:16px 0}
</style>
</head>

var SB=lsGet(LS_SB,{url:"",key:""});
function sbReady(){return !!(SB&&SB.url&&SB.key);}
function sbOrigin(){try{return new URL(SB.url).origin;}catch(e){return (SB.url||"").replace(/\/.*$/,"").replace(/\/+$/,"");}}
function sbBase(){return sbOrigin()+"/rest/v1/artikel";}
function sbBearer(){return (AUTH&&AUTH.access_token)?AUTH.access_token:SB.key;}
function sbHeaders(extra){var h={apikey:SB.key,Authorization:"Bearer "+sbBearer(),"Content-Type":"application/json"};if(extra)for(var k in extra)h[k]=extra[k];return h;}
function sbGetAll(){
  var out=[];
  function page(off){
    return fetch(sbBase()+"?select=data,updated_at&order=updated_at.asc&limit=1000&offset="+off,{cache:"no-store",headers:sbHeaders()})
      .then(function(r){if(!r.ok)throw new Error("sb "+r.status);return r.json();})
      .then(function(rows){rows.forEach(function(x){if(x&&x.data)out.push(x.data);});if(rows.length>=1000)return page(off+1000);return out;});
  }
  return page(0);
}
function sbUpsert(art){
  var row={id:art.id,data:art,updated_at:art.updated||nowISO()};
  return fetch(sbBase(),{method:"POST",headers:sbHeaders({Prefer:"resolution=merge-duplicates,return=minimal"}),body:JSON.stringify([row])})
    .then(function(r){if(!r.ok)throw new Error("sb "+r.status);});
}
function sbDelete(id){
  return fetch(sbBase()+"?id=eq."+encodeURIComponent(id),{method:"DELETE",headers:sbHeaders({Prefer:"return=minimal"})})
    .then(function(r){if(!r.ok)throw new Error("sb "+r.status);});
}
var IMG_BUCKET="alzipedia-bilder";
function fmtSize(b){b=+b||0;if(b<1024)return b+" B";if(b<1048576)return Math.round(b/1024)+" KB";return (b/1048576).toFixed(1)+" MB";}
function sbUploadFile(file){
  if(!sbReady())return Promise.reject(new Error("offline"));
  var base=sbOrigin();
  var ext=((file.name||"").split(".").pop()||"dat").toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,8);
  var path="dateien/"+new Date().getFullYear()+"/"+uid()+(ext?"."+ext:"");
  return fetch(base+"/storage/v1/object/"+IMG_BUCKET+"/"+path,{method:"POST",
    headers:{apikey:SB.key,Authorization:"Bearer "+sbBearer(),"Content-Type":file.type||"application/octet-stream","x-upsert":"true"},body:file})
    .then(function(r){if(!r.ok)throw new Error("up "+r.status);return base+"/storage/v1/object/public/"+IMG_BUCKET+"/"+path;});
}
function sbUploadImage(dataUri){
  if(!sbReady())return Promise.resolve(dataUri);
  return fetch(dataUri).then(function(r){return r.blob();}).then(function(blob){
    var ext=(blob.type||"image/jpeg").split("/")[1]||"jpg";
    var path=new Date().getFullYear()+"/"+uid()+"."+ext;
    var base=sbOrigin();
    return fetch(base+"/storage/v1/object/"+IMG_BUCKET+"/"+path,{method:"POST",
      headers:{apikey:SB.key,Authorization:"Bearer "+sbBearer(),"Content-Type":blob.type||"image/jpeg","x-upsert":"true"},body:blob})
      .then(function(r){if(!r.ok)throw new Error("up "+r.status);return base+"/storage/v1/object/public/"+IMG_BUCKET+"/"+path;});
  });
}

/* ===================== Auth (Supabase) ===================== */
function authBase(){return sbOrigin()+"/auth/v1";}
function authKeyHeaders(){return {apikey:SB.key,"Content-Type":"application/json"};}
function authValid(){return !!(AUTH&&AUTH.access_token);}
function nameFromEmail(e){return e?String(e).split("@")[0]:"";}
function curFromAuth(){return AUTH?{n:AUTH.user.name,email:AUTH.user.email,id:AUTH.user.id}:null;}
var ADMINS=["martin@alzinger-maschinenbau.de"];
function isAdmin(){return !!(CUR&&CUR.email&&ADMINS.indexOf((CUR.email||"").toLowerCase())>=0);}
function authStore(j){
  var u=j.user||{};
  var name=(u.user_metadata&&(u.user_metadata.name||u.user_metadata.full_name))||nameFromEmail(u.email);
  AUTH={access_token:j.access_token,refresh_token:j.refresh_token,
        expires_at:Date.now()+((j.expires_in||3600)*1000),
        user:{id:u.id,email:u.email,name:name}};
  lsSet(LS_AUTH,AUTH);CUR=curFromAuth();
}
function authForceLogout(){AUTH=null;CUR=null;try{localStorage.removeItem(LS_AUTH);}catch(e){}}
function authLogin(email,password){
  var url=authBase()+"/token?grant_type=password";
  return fetch(url,{method:"POST",headers:authKeyHeaders(),body:JSON.stringify({email:email,password:password})})
    .then(function(r){return r.json().catch(function(){return{};}).then(function(j){return {ok:r.ok,status:r.status,j:j};});},
          function(netErr){throw {status:0,msg:(netErr&&netErr.message)||"Netzwerkfehler",url:url};})
    .then(function(res){if(!res.ok)throw {status:res.status,msg:(res.j&&(res.j.error_description||res.j.msg||res.j.error))||"Anmeldung fehlgeschlagen",url:url};authStore(res.j);return AUTH;});
}
function authRefresh(){
  if(!(AUTH&&AUTH.refresh_token))return Promise.reject(new Error("no refresh token"));
  return fetch(authBase()+"/token?grant_type=refresh_token",{method:"POST",headers:authKeyHeaders(),body:JSON.stringify({refresh_token:AUTH.refresh_token})})
    .then(function(r){
      if(r.status===400||r.status===401){authForceLogout();var ap=$("app");if(ap&&!ap.classList.contains("hidden"))showGate();throw new Error("auth invalid");}
      if(!r.ok)throw new Error("refresh "+r.status);
      return r.json();
    }).then(function(j){authStore(j);return AUTH.access_token;});
}
function ensureToken(){
  if(!authValid())return Promise.resolve(null);
  if(Date.now()<AUTH.expires_at-60000)return Promise.resolve(AUTH.access_token);
  return authRefresh().catch(function(){return (AUTH&&AUTH.access_token)||null;});
}
function authLogout(){
  var p=Promise.resolve();
  if(authValid()&&navigator.onLine){
    p=fetch(authBase()+"/logout",{method:"POST",headers:{apikey:SB.key,Authorization:"Bearer "+AUTH.access_token}}).catch(function(){});
  }
  return p.then(function(){authForceLogout();});
}

var DB={arts:{}};           // id -> artikel
var QUEUE=lsGet(LS_Q,[]);   // ausstehende Ops [{op:"up"|"del", id, art?}]
function loadLocal(){DB=lsGet(LS_DB,{arts:{}});if(!DB.arts)DB.arts={};}
function saveLocal(){lsSet(LS_DB,DB);}
function queuePush(op){QUEUE.push(op);lsSet(LS_Q,QUEUE);}
function artsArr(){var a=[];for(var id in DB.arts){var x=DB.arts[id];if(x&&!x.deleted)a.push(x);}return a;}

function setConn(state){ // "ok" | "off" | ""
  var els=document.querySelectorAll(".conn");for(var i=0;i<els.length;i++){els[i].className="conn"+(state?" "+state:"");
    var el2=els[i].querySelector(".t");if(el2)el2.textContent=state==="ok"?t("conn_ok"):(state==="off"?t("conn_off"):t("conn_no"));}
}

function flushQueue(){
  if(!sbReady()||!QUEUE.length)return Promise.resolve();
  var op=QUEUE[0];
  var p=op.op==="del"?sbDelete(op.id):sbUpsert(op.art);
  return p.then(function(){QUEUE.shift();lsSet(LS_Q,QUEUE);return flushQueue();})
          .catch(function(){setConn("off");/* spaeter erneut */});
}

function syncPull(){
  if(!sbReady()){setConn("");return Promise.resolve();}
  return ensureToken().then(function(){return flushQueue();}).then(sbGetAll).then(function(list){
    list.forEach(function(srv){
      if(!srv||!srv.id)return;
      var loc=DB.arts[srv.id];
      // ausstehende lokale Aenderung gewinnt
      var pending=QUEUE.some(function(o){return o.id===srv.id;});
      if(pending)return;
      if(!loc||(srv.updated||"")>=(loc.updated||""))DB.arts[srv.id]=srv;
    });
    saveLocal();setConn("ok");
  }).catch(function(){setConn("off");});
}

function saveArticle(art){
  art.updated=nowISO();
  if(!art.created)art.created=art.updated;
  if(!art.author)art.author=(CUR&&CUR.n)||"";
  DB.arts[art.id]=art;saveLocal();
  if(sbReady()){sbUpsert(art).then(function(){setConn("ok");}).catch(function(){queuePush({op:"up",id:art.id,art:art});setConn("off");});}
  else queuePush({op:"up",id:art.id,art:art});
}
function trainDocs(){return artsArr().filter(function(a){return a.train;}).sort(function(x,y){return (y.updated||"").localeCompare(x.updated||"");});}
function saveTraining(frage,antwort,id,images){
  frage=(frage||"").trim();antwort=(antwort||"").trim();
  if(!frage||!antwort)return false;
  var art;
  if(id&&DB.arts[id]){art=JSON.parse(JSON.stringify(DB.arts[id]));}
  else{art={id:uid(),type:"faq",tags:[],images:[],files:[],komponenten:[],reparaturen:[],termine:[],links:[],dbl:[]};}
  art.train=true;art.title=frage;art.body=antwort;art.sym="";art.urs="";art.los="";art.cat="";
  if(images)art.images=images.slice();
  saveArticle(art);return true;
}
function deleteArticle(id){
  var art=DB.arts[id];if(!art)return;
  art.deleted=true;art.updated=nowISO();DB.arts[id]=art;saveLocal();
  if(sbReady()){sbDelete(id).then(function(){delete DB.arts[id];saveLocal();}).catch(function(){queuePush({op:"del",id:id});});}
  else queuePush({op:"del",id:id});
}

/* ===================== Text-Rendering (leichtes Markdown) ===================== */
function renderText(s){
  if(!s)return "";
  var lines=String(s).split(/\r?\n/),html="",inList=false;
  function inline(t){return esc(t)
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/(^|[^\w])\*([^*]+)\*/g,"$1<em>$2</em>")
    .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}
  for(var i=0;i<lines.length;i++){
    var ln=lines[i];
    if(/^\s*[-•]\s+/.test(ln)){if(!inList){html+="<ul>";inList=true;}html+="<li>"+inline(ln.replace(/^\s*[-•]\s+/,""))+"</li>";continue;}
    if(inList){html+="</ul>";inList=false;}
    if(/^\s*#{1,3}\s+/.test(ln)){html+="<h4>"+inline(ln.replace(/^\s*#{1,3}\s+/,""))+"</h4>";continue;}
    if(/^\s*$/.test(ln)){html+="<br>";continue;}
    html+="<div>"+inline(ln)+"</div>";
  }
  if(inList)html+="</ul>";
  return html;
}
function plain(s){return String(s||"").replace(/[*#>\-•]/g," ").replace(/\s+/g," ").trim();}

function daysUntil(ds){var d=new Date(ds);if(isNaN(d))return null;d.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000);}
function reminders(){
  var out=[];
  artsArr().forEach(function(a){
    if(a.type!=="maschine")return;
    var items=[];
    if(a.tuevBis)items.push({was:"TÜV",datum:a.tuevBis});

function sampleText(text,total,wins){

function kiKnowledgeDigest(){
  var head="WICHTIG: Der folgende Inhalt ist BEREITS dokumentiert (Betriebsanleitung / Serviceliste / Datenblätter) bzw. schon gelernt. "+
    "Stelle KEINE Frage, deren Antwort hier bereits steht – auch nicht sinngemäß. "+

    "undokumentierte Tricks/Kniffe, häufige Bedienfehler – also Wissen, das in keiner Anleitung steht.\n\n";
  var parts=[],used=0,cap=42000;
  artsArr().forEach(function(a){
    if(used>=cap)return;
    var txt=(a.files||[]).map(function(f){return f.text||"";}).join("\n").trim();
    if(a.dbl&&a.dbl.length)txt+=" "+dblText(a);
    if(!txt)return;
    var room=Math.min(9000,cap-used);
    var chunk="### DOKUMENT: "+(a.title||"")+"\n"+sampleText(txt,room,7);
    parts.push(chunk);used+=chunk.length;
  });
  var docs=parts.length?parts.join("\n\n"):"(noch keine durchsuchbaren Dokumente in der Wissensablage)";
  var learned=trainDocs().map(function(a){return "- "+(a.title||"");});
  var asked=(INTERVIEW.asked||[]).slice(-60).map(function(q){return "- "+q;});
  var extra="";
  if(learned.length)extra+="\n\nSCHON GELERNT (nicht erneut fragen):\n"+learned.join("\n");
  if(asked.length)extra+="\n\nSCHON GEFRAGT (nicht wiederholen):\n"+asked.join("\n");

/* Findet im (langen) Dokumenttext die Stelle mit der höchsten Dichte an Suchbegriffen
   und liefert einen Ausschnitt rundherum – damit Alzi die ECHTE Antwort sieht, nicht nur das Deckblatt. */
function bestPassage(text,terms,win){
  text=String(text||"");win=win||3000;
  if(text.length<=win)return text;
  terms=(terms||[]).map(function(w){return (w||"").toLowerCase();}).filter(function(w){return w.length>=2;});
  var exp=[];terms.forEach(function(w){aExpand(w).forEach(function(e){if(exp.indexOf(e)<0)exp.push(e);});});
  if(!exp.length)return text.slice(0,win);
  var low=text.toLowerCase(),step=Math.max(160,Math.floor(win/6)),best=0,bestScore=-1;
  for(var p=0;p<low.length;p+=step){
    var seg=low.slice(p,p+win),sc=0;
    for(var i=0;i<exp.length;i++){var idx=seg.indexOf(exp[i]);if(idx>=0)sc++;}
    if(sc>bestScore){bestScore=sc;best=p;}
  }
  if(bestScore<=0)return text.slice(0,win);
  var start=Math.max(0,best-Math.floor(win*0.15));
  return (start>0?"… ":"")+text.slice(start,start+win).trim()+(start+win<text.length?" …":"");
}

function planChoose(q,texts,count){
  var terms=aTerms(q),scored=[];
  for(var p=1;p<=count;p++){var low=texts[p]||"",s=0;terms.forEach(function(w){if(aHit(low,w))s++;});scored.push({p:p,s:s});}
  scored.sort(function(x,y){return y.s-x.s;});
  var pick=[];
  if(scored[0]&&scored[0].s>0){pick.push(scored[0].p);if(scored[1]&&scored[1].s>0)pick.push(scored[1].p);}
  else pick=[1];
  return pick.slice(0,2);
}
/* lädt das Plan-PDF einmal, wählt die passende(n) Seite(n) (per gespeichertem/OCR-Text) und rendert sie als Bild */
function planVision(url,q,pagesText,cb){
  loadPdfJs().then(function(lib){
    return fetch(url).then(function(r){return r.arrayBuffer();}).then(function(buf){
      return lib.getDocument({data:new Uint8Array(buf)}).promise.then(function(pdf){
        function renderPick(pick){
          var imgs=[],rseq=Promise.resolve();
          pick.forEach(function(pn){rseq=rseq.then(function(){return renderPdfPageImg(pdf,pn).then(function(du){imgs.push(du);});});});
          return rseq.then(function(){cb(imgs);});
        }
        if(pagesText&&pagesText.length){
          var cnt=Math.min(pdf.numPages,pagesText.length),tx={};
          for(var p=1;p<=cnt;p++)tx[p]=(pagesText[p-1]||"").toLowerCase();
          return renderPick(planChoose(q,tx,cnt));
        }
        var n=Math.min(pdf.numPages,40),texts={},seq=Promise.resolve();
        for(var i=1;i<=n;i++){(function(pp){seq=seq.then(function(){return pdf.getPage(pp).then(function(pg){return pg.getTextContent();}).then(function(tc){texts[pp]=tc.items.map(function(it){return it.str;}).join(" ").toLowerCase();});});})(i);}
        return seq.then(function(){return renderPick(planChoose(q,texts,n));});
      });
    });
  }).catch(function(){cb([]);});
}

function speechLang(){return ({de:"de-DE",en:"en-US",pl:"pl-PL",fr:"fr-FR"})[LANG]||"de-DE";}
var REC=null,RECON=false;
function toggleMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast(t("mic_no"));return;}
  if(RECON&&REC){try{REC.stop();}catch(e){}return;}
  try{
    REC=new SR();REC.lang=speechLang();REC.interimResults=true;REC.continuous=false;REC.maxAlternatives=1;
    var inp=$("chatIn");var base=inp?inp.value:"";if(base&&!/\s$/.test(base))base+=" ";
    var finalAcc="";
    REC.onstart=function(){RECON=true;if($("micBtn"))$("micBtn").classList.add("on");toast(t("mic_listen"));};
    REC.onerror=function(e){RECON=false;if($("micBtn"))$("micBtn").classList.remove("on");
      var er=e&&e.error;if(er==="not-allowed"||er==="service-not-allowed")toast(t("mic_perm"));else if(er!=="aborted"&&er!=="no-speech")toast(t("mic_no"));};
    REC.onend=function(){RECON=false;if($("micBtn"))$("micBtn").classList.remove("on");if($("chatIn"))$("chatIn").focus();};
    REC.onresult=function(ev){
      var intr="";
      for(var i=ev.resultIndex;i<ev.results.length;i++){var r=ev.results[i];if(r.isFinal)finalAcc+=r[0].transcript;else intr+=r[0].transcript;}
      if($("chatIn")){$("chatIn").value=base+finalAcc+intr;autoGrow($("chatIn"));}
    };
    REC.start();
  }catch(e){RECON=false;toast(t("mic_no"));}
}

/* ===================== CSV-Import (Datenblätter) ===================== */
function parseCSV(text){
  text=String(text||"").replace(/^﻿/,"");
  var rows=[],row=[],cur="",i=0,inq=false,ch;
  while(i<text.length){ch=text[i];
    if(inq){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i+=2;continue;}inq=false;i++;continue;}cur+=ch;i++;continue;}
    if(ch==='"'){inq=true;i++;continue;}
    if(ch===';'){row.push(cur);cur="";i++;continue;}
    if(ch==='\r'){i++;continue;}
    if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur="";i++;continue;}
    cur+=ch;i++;}
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function dblFromCsv(text){
  var rows=parseCSV(text);if(!rows.length)return {dbl:[],raw:{}};
  var head=rows[0].map(function(s){return (s||"").trim();});
  var bi=head.indexOf("Blatt"),zi=head.indexOf("Zeile");
  if(bi<0){bi=0;zi=1;}
  var start=(zi>=0?zi:bi)+1,order=[],map={},raw={};
  for(var r=1;r<rows.length;r++){
    var rw=rows[r],blatt=((rw[bi]||"")+"").trim();if(!blatt)continue;
    var cells=rw.slice(start);while(cells.length&&!((cells[cells.length-1]||"")+"").trim())cells.pop();
    if(!map[blatt]){map[blatt]=[];order.push(blatt);raw[blatt]={};}
    if(cells.some(function(c){return ((c||"")+"").trim();}))map[blatt].push(cells);
    var z=parseInt(rw[zi],10);if(!isNaN(z))raw[blatt][z]=rw.slice(start);
  }
  return {dbl:order.map(function(b){return {n:b,r:map[b]};}),raw:raw};
}
function stammFromRaw(raw){
  var key=Object.keys(raw).filter(function(k){return /^Maschine/i.test(k);})[0];if(!key)return {};
  var s=raw[key];function c(z,col){return ((s[z]&&s[z][col-1])||"").toString().trim();}
  return {modell:c(17,6),fahrgestellnr:c(2,4),baujahr:c(18,6),nr:c(1,3),stand:c(1,6)};
}
function dblText(a){return (a.dbl||[]).map(function(d){return d.n+" "+(d.r||[]).map(function(r){return r.join(" ");}).join(" ");}).join(" ");}
function xlDate(v){v=(""+(v==null?"":v)).trim();if(/^\d{4,6}$/.test(v)){var d=new Date(Date.UTC(1899,11,30)+parseInt(v,10)*86400000);if(!isNaN(d))return d.toISOString().slice(0,10);}var d2=new Date(v);if(!isNaN(d2)&&/\d{4}/.test(v))return d2.toISOString().slice(0,10);return "";}

function resizeImage(file,max,cb){

  r.onload=function(){

      var w=img.width,h=img.height,sc=Math.min(1,max/Math.max(w,h));
      var cv=document.createElement("canvas");cv.width=Math.round(w*sc);cv.height=Math.round(h*sc);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      cb(cv.toDataURL("image/jpeg",0.82));

  };
  r.onerror=function(){cb(null);};r.readAsDataURL(file);

/* ---- PDF-Volltext beim Hochladen auslesen (pdf.js, kostenlos) ---- */
function loadPdfJs(){
  if(window.pdfjsLib&&window.pdfjsLib.getDocument)return Promise.resolve(window.pdfjsLib);
  return new Promise(function(res,rej){
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=function(){try{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";res(window.pdfjsLib);}catch(e){rej(e);}};
    s.onerror=function(){rej(new Error("pdfjs"));};
    document.head.appendChild(s);
  });
}
function isPdf(f){return /pdf/i.test(f.type||"")||/\.pdf$/i.test(f.name||"");}
function extractPdfBuf(buf){
  return loadPdfJs().then(function(lib){
    return lib.getDocument({data:new Uint8Array(buf)}).promise.then(function(pdf){
      var n=pdf.numPages,out="",seq=Promise.resolve();
      for(var i=1;i<=n;i++){(function(p){seq=seq.then(function(){if(out.length>400000)return;return pdf.getPage(p).then(function(pg){return pg.getTextContent();}).then(function(tc){out+=tc.items.map(function(it){return it.str;}).join(" ")+"\n";});});})(i);}
      return seq.then(function(){return out.replace(/\s+/g," ").trim().slice(0,400000);});
    });
  }).catch(function(){return "";});
}
function extractPdfText(file){
  if(!isPdf(file))return Promise.resolve("");
  return file.arrayBuffer().then(function(buf){return extractPdfBuf(buf);}).catch(function(){return "";});
}
function extractPdfFromUrl(url){
  return fetch(url).then(function(r){return r.arrayBuffer();}).then(function(buf){return extractPdfBuf(buf);}).catch(function(){return "";});
}

function renderPdfPageImg(pdf,pageNum){
  return pdf.getPage(pageNum).then(function(page){
    var base=page.getViewport({scale:1});var scale=Math.min(2.5,1600/base.width);if(!(scale>0))scale=1.5;
    var vp=page.getViewport({scale:scale});var c=document.createElement("canvas");c.width=Math.round(vp.width);c.height=Math.round(vp.height);
    return page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise.then(function(){return c.toDataURL("image/jpeg",0.72);});
  });

/* liest ein PDF aus: Text je Seite; bei Plänen/Scans (wenig Text) wird die Seite per OCR gelesen */
function learnDocDeep(url,planLike){
  return loadPdfJs().then(function(lib){
    return fetch(url).then(function(r){return r.arrayBuffer();}).then(function(buf){
      return lib.getDocument({data:new Uint8Array(buf)}).promise.then(function(pdf){
        var n=pdf.numPages,pageText={},seq=Promise.resolve();
        for(var i=1;i<=n;i++){(function(p){seq=seq.then(function(){return pdf.getPage(p).then(function(pg){return pg.getTextContent();}).then(function(tc){pageText[p]=tc.items.map(function(it){return it.str;}).join(" ").replace(/\s+/g," ").trim();});});})(i);}
        return seq.then(function(){
          var total=0;for(var p1=1;p1<=n;p1++)total+=(pageText[p1]||"").length;
          var avg=n?total/n:0,visual=planLike||avg<150;
          if(!visual){
            var txt="";for(var a=1;a<=n;a++)txt+=(pageText[a]||"")+"\n";
            return {text:txt.slice(0,400000),pages:[],ocr:0,visual:false};
          }
          var cap=Math.min(n,20),out={},ocr=0,oseq=Promise.resolve();
          for(var k=1;k<=cap;k++){(function(p){oseq=oseq.then(function(){
            var tx=pageText[p]||"";
            if(tx.length>=200){out[p]=tx;return;}
            return renderPdfPageImg(pdf,p).then(function(du){return ocrImage(du);}).then(function(ot){if(ot&&ot.length>tx.length){out[p]=ot;ocr++;}else out[p]=tx;});
          });})(k);}
          return oseq.then(function(){
            var pages=[],txt2="";for(var b=1;b<=cap;b++){pages.push(out[b]||"");txt2+=(out[b]||"")+"\n";}
            return {text:txt2.slice(0,400000),pages:pages,ocr:ocr,visual:true};
          });
        });
      });
    });
  }).catch(function(){return {text:"",pages:[],ocr:0,visual:false};});
}

  var todo=[];
  wissenDocs().forEach(function(a){(a.files||[]).forEach(function(f){if(isPdf(f)&&f.url&&!f.learned)todo.push({a:a,f:f});});});
  if(!todo.length){toast(t("learn_none"));return;}
  LEARNING=true;var ok=0,bad=0,ocrTot=0,i=0;
  if($("learnBtn"))$("learnBtn").disabled=true;
  function step(){
    if(i>=todo.length){
      LEARNING=false;if($("learnBtn"))$("learnBtn").disabled=false;
      if($("wissenList"))$("wissenList").innerHTML=wissenRows();bindWissen();renderTabs();renderList();
      toast(t("learn_done2",{ok:ok,ocr:ocrTot,bad:bad}));return;
    }
    var it=todo[i++];toast(t("learn_run",{n:i,t:todo.length}));
    learnDocDeep(it.f.url,isPlanDoc(it.a)).then(function(res){
      it.f.learned=Date.now();
      var has=res.text&&res.text.replace(/\s/g,"").length>=20;
      if(has){it.f.text=res.text;ok++;}else bad++;
      if(res.visual&&res.pages&&res.pages.length)it.f.pages=res.pages;
      if(res.ocr)ocrTot+=res.ocr;
      saveArticle(it.a);step();
    });
  }
  step();
}

var SETUP_SQL='create table if not exists artikel (\n  id text primary key,\n  data jsonb,\n  updated_at timestamptz default now()\n);\nalter table artikel enable row level security;\n\n-- nur eingeloggte Techniker duerfen lesen/schreiben:\ndrop policy if exists "alle" on artikel;\ncreate policy "eingeloggte" on artikel for all to authenticated\n  using (true) with check (true);\n\n-- Bilder-Speicher:\ninsert into storage.buckets (id,name,public)\n  values (\'alzipedia-bilder\',\'alzipedia-bilder\',true)\n  on conflict (id) do nothing;\ncreate policy "img lesen" on storage.objects for select\n  using (bucket_id=\'alzipedia-bilder\');\ncreate policy "img schreiben" on storage.objects for insert to authenticated\n  with check (bucket_id=\'alzipedia-bilder\');';

function pendingDeepLink(){try{var m=(location.hash||"").match(/[#&]id=([^&]+)/);return m?decodeURIComponent(m[1]):"";}catch(e){return "";}}
function deepLinkUrl(id){return location.origin+location.pathname+"#id="+encodeURIComponent(id);}
function startApp(){
  $("gate").classList.add("hidden");$("app").classList.remove("hidden");
  applyI18n();loadLocal();renderTabs();renderList();showView("viewList");
  setTimeout(blurField,80);setTimeout(blurField,350);

  syncPull().then(function(){renderTabs();renderList();if(want&&DB.arts[want])openDetail(want);});
}

function renderGate(){
  var b=$("gateBody");if(!b)return;
  if(!sbReady()){
    b.innerHTML='<form id="connForm" autocomplete="on">'+
      '<div class="note" style="text-align:left">Dieses Gerät einmalig mit der Alzipedia-Cloud verbinden.</div>'+
      '<input class="field" id="cUrl" type="url" placeholder="https://xxxx.supabase.co" autocomplete="off" autocapitalize="off" autocorrect="off" value="'+esc(SB.url||"")+'">'+
      '<input class="field" id="cKey" placeholder="sb_publishable_…" autocomplete="off" autocapitalize="off" autocorrect="off" value="'+esc(SB.key||"")+'">'+
      '<div class="gateerr" id="cerr"></div>'+
      '<button class="btn primary block" type="submit">Verbinden</button>'+
      '<details style="margin-top:14px;text-align:left"><summary style="cursor:pointer;font-weight:700;color:var(--muted)">Einrichtung in Supabase (einmalig)</summary>'+
      '<div style="font-size:13px;line-height:1.6;margin-top:8px">1. Projekt auf <b>supabase.com</b> anlegen (Region Frankfurt/EU).<br>2. Im <b>SQL Editor</b> ausführen:</div>'+
      '<div class="code">'+esc(SETUP_SQL)+'</div>'+
      '<div style="font-size:13px;line-height:1.6">3. <b>Authentication → Users → Add user</b>: für jeden Techniker E-Mail + Passwort anlegen (Häkchen „Auto Confirm User").<br>4. <b>Project Settings → API</b>: <b>Project URL</b> und <b>Publishable key</b> (sb_publishable_…) hier oben eintragen.</div>'+
      '</details></form>';
    $("connForm").addEventListener("submit",function(ev){
      ev.preventDefault();
      var url=($("cUrl").value||"").trim(),key=($("cKey").value||"").trim();
      if(!/^https?:\/\/.+/.test(url)||!key){$("cerr").textContent="Bitte Project-URL und Key eintragen.";return;}
      try{url=new URL(url).origin;}catch(e){url=url.replace(/\/+$/,"");}
      SB={url:url,key:key};lsSet(LS_SB,SB);renderGate();
    });
  }else{
    b.innerHTML='<form id="loginForm" autocomplete="on">'+
      '<input class="field" id="gu" type="email" placeholder="'+esc(t("login_email"))+'" autocomplete="username" autocapitalize="off" autocorrect="off">'+
      '<input class="field" id="gp" type="password" placeholder="'+esc(t("login_pw"))+'" autocomplete="current-password">'+
      '<div class="gateerr" id="gerr"></div>'+
      '<div id="gdbg" style="font-size:11px;color:var(--muted);word-break:break-all;margin:-4px 0 8px"></div>'+
      '<button class="btn primary block" type="submit">'+esc(t("login_btn"))+'</button>'+
      '<button type="button" class="btn ghost block" id="connReset" style="margin-top:8px">Anderes Projekt verbinden</button>'+
      '</form>';
    var f=$("loginForm");
    f.addEventListener("submit",function(ev){
      ev.preventDefault();
      var email=($("gu").value||"").trim(),pass=$("gp").value||"";
      if(!email||!pass){$("gerr").textContent="E-Mail und Passwort eingeben.";return;}
      $("gerr").textContent="";var btn=f.querySelector('button[type=submit]');btn.disabled=true;btn.textContent="Anmelden …";
      authLogin(email,pass).then(function(){startApp();}).catch(function(err){
        btn.disabled=false;btn.textContent="Anmelden";
        var base=(err&&err.status===400)?"E-Mail oder Passwort falsch.":(navigator.onLine?"Anmeldung fehlgeschlagen.":"Keine Internetverbindung.");
        var info=err&&(err.msg||err.message);var st=err&&err.status;
        $("gerr").textContent=base+((info||st)?" ["+(info||"")+(st?(info?", ":"")+st:"")+"]":"");
        if(err&&err.url){var dbg=$("gdbg");if(dbg)dbg.textContent="Aufgerufen: "+err.url;}
      });
    });
    $("connReset").onclick=function(){if(confirm("Cloud-Verbindung auf diesem Gerät trennen?")){authForceLogout();SB={url:"",key:""};lsSet(LS_SB,SB);renderGate();}};
    var gu=$("gu");if(gu)gu.focus();
  }
}
